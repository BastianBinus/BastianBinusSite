<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="colorpick.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Color Composer</title>
</head>

<body>

    <div class="composerContainer">
        <div class="titleDiv">
            <h1>COLOR COMPOSER</h1>
        </div>
        <div class="controls">
            <div class="slider-info">
                <span>Hue</span>
                <span id="hue-val">180°</span>
            </div>
            <input type="range" min="0" max="360" value="180" id="Hue">
            <div class="slider-info">
                <span>Saturation</span>
                <span id="sat-val">50%</span>
            </div>
            <input type="range" min="0" max="100" value="50" id="Saturation">
            <div class="slider-info">
                <span>Lightness</span>
                <span id="light-val">50%</span>
            </div>
            <input type="range" min="0" max="100" value="50" id="Lightness">
        </div>
        <div class="rightside">
            <div class="color-preview">
                <span></span>
            </div>
            <div class="output">
                <div class="output-field">
                    <input type="text" id="hexOutput" readonly>
                    <button onclick="copyValue('hexOutput')"><button onclick="copyValue('hexOutput')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                viewBox="0 0 16 16">
                                <path
                                    d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z" />
                                <path
                                    d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z" />
                            </svg>
                        </button></button>
                </div>
                <div class="output-field">
                    <input type="text" id="rgbOutput" readonly>
                    <button onclick="copyValue('rgbOutput')"><button onclick="copyValue('rgbOutput')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                viewBox="0 0 16 16">
                                <path
                                    d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z" />
                                <path
                                    d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z" />
                            </svg>
                        </button></button>
                </div>
            </div>
        </div>
    </div>


    <script src="HSLtoRGBtoHEX.js"></script>
    <script src="colorpick.js"></script>
</body>

</html>
